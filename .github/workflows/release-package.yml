name: Release Package

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CombatMode release zip
        run: |
          ZIP_NAME="CombatMode-${{ github.event.release.tag_name }}.zip"
          zip -r "$ZIP_NAME" CombatMode
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
