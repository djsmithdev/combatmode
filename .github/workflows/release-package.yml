name: Release Package

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Packager reads manual-changelog relative to -t topdir. Read release body from
      # GITHUB_EVENT_PATH so lines starting with "#" are not lost.
      - name: Write CombatMode/CHANGELOG.md from release body
        run: |
          python3 << 'PY'
          import json
          import os

          path = os.environ["GITHUB_EVENT_PATH"]
          with open(path, encoding="utf-8") as f:
              event = json.load(f)
          body = (event.get("release") or {}).get("body") or ""
          body = body.strip()
          if not body:
              body = "See the GitHub release page for notes."
          os.makedirs("CombatMode", exist_ok=True)
          with open("CombatMode/CHANGELOG.md", "w", encoding="utf-8") as out:
              out.write(body)
              if not body.endswith("\n"):
                  out.write("\n")
          PY

      # release.sh requires -d "$topdir/.git" (directory); a gitdir *file* fails that check — use symlink.
      - name: Point CombatMode at repository git
        run: ln -sfn ../.git CombatMode/.git

      # Without GIT_WORK_TREE/GIT_DIR, git -C CombatMode treats addon files as untracked and the
      # packager adds them all to ignore (only CHANGELOG is spared) — zip ends up changelog-only.
      # BetterBags avoids this by keeping the addon at repo root; we pin the work tree to the checkout.
      - name: Package and publish addon
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          GIT_WORK_TREE: ${{ github.workspace }}
          GIT_DIR: ${{ github.workspace }}/.git
        with:
          args: -g retail -p "${{ vars.CURSEFORGE_PROJECT_ID }}" -n "CombatMode-{project-version}" -t CombatMode -m .pkgmeta
