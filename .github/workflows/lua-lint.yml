name: Lua Lint

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-lua-tools-v1

      - name: Install StyLua and Selene
        run: |
          cargo install --locked stylua || true
          cargo install --locked selene || true

      - name: Check formatting
        run: stylua --check CombatMode

      - name: Lint Lua
        run: selene --config selene.toml CombatMode
